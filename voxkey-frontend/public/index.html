<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#00ffc8" />
    <meta
      name="description"
      content="VoxKey - Authentification Comportementale Continu. Système de sécurité basé sur la reconnaissance vocale et les patterns clavier."
    />
    <meta name="keywords" content="biométrie, authentification, voix, clavier, sécurité" />
    <meta name="author" content="VoxKey Team" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="VoxKey - Continuous Behavioral Authentication" />
    <meta
      property="og:description"
      content="Advanced biometric authentication using voice and keyboard patterns"
    />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VoxKey" />
    <meta
      name="twitter:description"
      content="Continuous behavioral authentication system"
    />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Courier+Prime:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Web App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VoxKey" />

    <!-- Security Headers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:5000 https://*.bioauth.local" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />

    <!-- Performance -->
    <link rel="dns-prefetch" href="http://localhost:5000" />
    <link rel="preload" href="%PUBLIC_URL%/fonts/space-mono.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Title -->
    <title>VoxKey - Authentification Comportementale</title>

    <!-- Loading Screen Styles -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #050811 0%, #0d0f2d 100%);
        color: #e0e6ff;
        overflow: hidden;
      }

      #root {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100vh;
        position: relative;
      }

      /* Loading Spinner */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(0, 255, 200, 0.1);
        border-top-color: #00ffc8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 14px;
        color: #00ffc8;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: 'Space Mono', monospace;
      }

      /* Noscript Message */
      noscript {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100vh;
        background: linear-gradient(135deg, #050811 0%, #0d0f2d 100%);
        color: #ff6666;
        font-size: 16px;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
      }
    </style>
  </head>

  <body>
    <!-- Root element for React app -->
    <div id="root">
      <div class="app-loading">
        <div class="spinner"></div>
        <p class="loading-text">Chargement...</p>
      </div>
    </div>

    <!-- Fallback for JavaScript disabled -->
    <noscript>
      <div>
        <h1>⚠️ JavaScript requis</h1>
        <p>VoxKey nécessite JavaScript pour fonctionner.</p>
        <p>Veuillez activer JavaScript dans les paramètres de votre navigateur.</p>
      </div>
    </noscript>

    <!-- Performance monitoring -->
    <script>
      if ('performance' in window && 'mark' in window.performance) {
        window.performance.mark('app-start');
      }

      // Detect if browser supports required features
      if (!window.localStorage || !window.sessionStorage) {
        alert('Votre navigateur ne supporte pas le stockage local.');
      }

      // Debug mode logging
      if (process.env.NODE_ENV === 'development') {
        console.log('VoxKey - Development Mode');
        console.log('API URL:', process.env.REACT_APP_API_URL);
      }
    </script>

    <!-- React App Script (injected by webpack) -->
  </body>
</html>
